<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #ffffff;
            --accent-color: #58a6ff;
            --btn-hover: #1f6feb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        .link-card {
            display: block;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background-color: var(--btn-hover);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Replace the URL below with your photo link or delete this line -->
        <img src="2026 BIT Logo Black P.png" alt="Profile" class="profile-img">
        
        <h1>My Connect Links</h1>

        <!-- EDIT YOUR LINKS BELOW -->
        <a href="https://t.me/baktoukithq" class="link-card" target="_blank">Telegram Channel</a>
        <a href="https://facebook.com/baktoukitsiemreap" class="link-card" target="_blank">Facebook Page</a>
        <a href="https://maps.app.goo.gl/psnekW4X2t33ubWe7" class="link-card" target="_blank">Google Map</a>

        <div class="footer">
            © Baktouk IT 2026
        </div>
    </div>

</body>
</html>
